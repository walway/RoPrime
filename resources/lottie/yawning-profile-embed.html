<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Profile effect</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: transparent !important;
				background-color: transparent !important;
				-webkit-user-select: none;
				-ms-user-select: none;
				user-select: none;
			}

			#container {
				width: 100%;
				height: 100%;
				position: relative;
				overflow: hidden;
				background: transparent !important;
				background-color: transparent !important;
				display: flex;
				align-items: center;
				justify-content: center;
				-webkit-user-select: none;
				-ms-user-select: none;
				user-select: none;
			}

			dotlottie-player,
			#dotLottie-canvas,
			canvas {
				width: 100%;
				height: 100%;
				background: transparent !important;
				background-color: transparent !important;
			}
		</style>
	</head>
	<body>
		<div id="container">
			<dotlottie-player
				src="https://lottie.host/eb451679-9120-462c-94cb-16c8291595a7/C1AjrRwsTE.lottie"
				background="transparent"
				speed="1"
				loop
				autoplay
			></dotlottie-player>
		</div>
		<script src="../vendor/dotlottie-player.js"></script>
		<script>
			(function () {
				function transparentizeCanvas() {
					document.querySelectorAll("canvas, #dotLottie-canvas").forEach((node) => {
						node.style.setProperty("background", "transparent", "important");
						node.style.setProperty("background-color", "transparent", "important");
					});
				}
				transparentizeCanvas();
				new MutationObserver(transparentizeCanvas).observe(document.body, {
					childList: true,
					subtree: true,
				});
				window.addEventListener("load", transparentizeCanvas);
			})();
		</script>
	</body>
</html>
